name: Deploy OpenHands to Azure VM

on:
  workflow_dispatch:

concurrency:
  group: deploy-openhands-azure-vm
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, publish, and deploy to Azure VM
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    environment: production

    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/openhands:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment settings
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          test -n "${{ vars.AZURE_CLIENT_ID }}"
          test -n "${{ vars.AZURE_TENANT_ID }}"
          test -n "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          test -n "$ACR_NAME"
          test -n "$VM_HOST"
          test -n "$VM_USER"
          test -n "$VM_SSH_PRIVATE_KEY"

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure access
        run: |
          set -euo pipefail

          az account show \
            --query "{subscription:name,tenant:tenantId}" \
            -o table

          az acr show \
            --name "$ACR_NAME" \
            --query "{name:name,loginServer:loginServer}" \
            -o table

      - name: Login to Azure Container Registry
        run: |
          set -euo pipefail
          az acr login --name "$ACR_NAME"

      - name: Patch single host-network sandbox lifecycle
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path(
              "openhands/app_server/sandbox/docker_sandbox_service.py"
          )

          source = path.read_text(encoding="utf-8")

          old = (
              "        # Enforce sandbox limits by cleaning up old sandboxes\n"
              "        await self.pause_old_sandboxes("
              "self.max_num_sandboxes - 1)\n"
          )

          new = (
              "        # Host-network sandboxes use fixed ports. When only one\n"
              "        # sandbox is allowed, remove any existing sandbox before\n"
              "        # starting its replacement so ports 8000/8001 are released.\n"
              "        if self.use_host_network and self.max_num_sandboxes == 1:\n"
              "            for existing in self.docker_client.containers.list("
              "all=True):\n"
              "                if existing.name and existing.name.startswith(\n"
              "                    self.container_name_prefix\n"
              "                ):\n"
              "                    existing.remove(force=True)\n"
              "        else:\n"
              "            await self.pause_old_sandboxes(\n"
              "                self.max_num_sandboxes - 1\n"
              "            )\n"
          )

          if old not in source:
              raise RuntimeError(
                  "Expected sandbox lifecycle code was not found. "
                  "The source may have changed."
              )

          patched = source.replace(old, new, 1)
          path.write_text(patched, encoding="utf-8")

          print("Single host-network sandbox lifecycle patch applied.")
          PY

      - name: Verify sandbox patch
        run: |
          set -euo pipefail

          grep -n \
            "Host-network sandboxes use fixed ports" \
            openhands/app_server/sandbox/docker_sandbox_service.py

          python -m py_compile \
            openhands/app_server/sandbox/docker_sandbox_service.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push OpenHands image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: containers/app/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}
          build-args: OPENHANDS_BUILD_VERSION=azure-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Export the published image
        run: |
          set -euo pipefail

          docker pull "$IMAGE"
          docker save "$IMAGE" -o openhands-image.tar
          ls -lh openhands-image.tar

      - name: Upload image to Azure VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: openhands-image.tar
          target: /tmp/openhands-deploy

      - name: Start and verify OpenHands
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ env.IMAGE }}
          VM_HOST: ${{ secrets.VM_HOST }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          envs: IMAGE,VM_HOST
          script_stop: true
          script: |
            set -euo pipefail

            command -v docker >/dev/null

            SANDBOX_HOST="${VM_HOST}.sslip.io"

            echo "Loading the new OpenHands image..."

            sudo docker load \
              -i /tmp/openhands-deploy/openhands-image.tar

            echo "Removing old sandbox containers..."

            while IFS= read -r sandbox_id; do
              if [ -n "$sandbox_id" ]; then
                sudo docker rm -f "$sandbox_id"
              fi
            done < <(
              sudo docker ps -aq \
                --filter "name=oh-agent-server-"
            )

            echo "Removing the previous OpenHands container..."

            sudo docker rm -f openhands 2>/dev/null || true

            echo "Preparing persistent directories..."

            sudo mkdir -p \
              /opt/openhands/home \
              /opt/openhands/workspace

            sudo chown -R 42420:42420 \
              /opt/openhands/home \
              /opt/openhands/workspace

            sudo chmod -R 770 \
              /opt/openhands/home \
              /opt/openhands/workspace

            echo "Starting OpenHands..."

            sudo docker run -d \
              --restart unless-stopped \
              --name openhands \
              -p 3000:3000 \
              --add-host host.docker.internal:host-gateway \
              --add-host "$SANDBOX_HOST:host-gateway" \
              -e PORT=3000 \
              -e OH_WEB_URL="http://$VM_HOST:3000" \
              -e OH_PERMITTED_CORS_ORIGINS_0="http://$VM_HOST:3000" \
              -e OH_SANDBOX_KIND="DockerSandboxServiceInjector" \
              -e OH_SANDBOX_CONTAINER_URL_PATTERN="http://$SANDBOX_HOST:{port}" \
              -e OH_SANDBOX_HOST_PORT=3000 \
              -e OH_SANDBOX_STARTUP_GRACE_SECONDS=90 \
              -e OH_SANDBOX_USE_HOST_NETWORK=true \
              -e OH_SANDBOX_MAX_NUM_SANDBOXES=1 \
              -e OH_PERSISTENCE_DIR=/.openhands \
              -e RUNTIME=docker \
              -e WORKSPACE_MOUNT_PATH=/opt/openhands/workspace \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v /opt/openhands/home:/.openhands \
              -v /opt/openhands/workspace:/opt/workspace_base \
              "$IMAGE"

            echo "Waiting for the OpenHands web application..."

            for attempt in $(seq 1 30); do
              if curl -fsS \
                http://127.0.0.1:3000/ \
                >/dev/null; then

                echo "OpenHands web application is healthy."

                sudo docker ps \
                  --filter "name=openhands"

                echo "Verifying sandbox hostname routing..."

                sudo docker exec openhands \
                  getent hosts "$SANDBOX_HOST"

                echo "Configured sandbox settings:"

                sudo docker inspect openhands \
                  --format '{{range .Config.Env}}{{println .}}{{end}}' |
                  grep -E \
                    '^(OH_SANDBOX_|OH_WEB_URL|OH_PERMITTED_CORS)' ||
                  true

                rm -f \
                  /tmp/openhands-deploy/openhands-image.tar

                exit 0
              fi

              echo "Waiting for OpenHands... attempt $attempt"
              sleep 5
            done

            echo "OpenHands failed its startup health check."

            sudo docker ps -a \
              --filter "name=openhands"

            sudo docker logs \
              --tail 250 \
              openhands

            exit 1

      - name: Deployment URL
        run: |
          echo "OpenHands URL: http://${{ secrets.VM_HOST }}:3000"

      - name: Logout from Azure
        if: always()
        run: |
          az logout || true
