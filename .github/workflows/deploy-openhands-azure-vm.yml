name: Deploy OpenHands to Azure VM

on:
  workflow_dispatch:

concurrency:
  group: deploy-openhands-azure-vm
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, publish, and deploy to Azure VM
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    environment: production

    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/openhands:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment settings
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${{ vars.AZURE_CLIENT_ID }}"
          test -n "${{ vars.AZURE_TENANT_ID }}"
          test -n "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          test -n "$ACR_NAME"
          test -n "$VM_HOST"
          test -n "$VM_USER"
          test -n "$VM_SSH_PRIVATE_KEY"

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure access
        run: |
          az account show --query "{subscription:name,tenant:tenantId}" -o table
          az acr show --name "$ACR_NAME" --query "{name:name,loginServer:loginServer}" -o table

      - name: Login to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push OpenHands image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: containers/app/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}
          build-args: OPENHANDS_BUILD_VERSION=azure-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Export the published image
        run: |
          set -euo pipefail
          docker pull "$IMAGE"
          docker save "$IMAGE" -o openhands-image.tar
          ls -lh openhands-image.tar

      - name: Upload image to Azure VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: openhands-image.tar
          target: /tmp/openhands-deploy

      - name: Start and verify OpenHands
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ env.IMAGE }}
          VM_HOST: ${{ secrets.VM_HOST }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          envs: IMAGE,VM_HOST
          script_stop: true
          script: |
            set -euo pipefail

            command -v docker >/dev/null

            sudo docker load -i /tmp/openhands-deploy/openhands-image.tar

            sudo mkdir -p /opt/openhands/home
            sudo mkdir -p /opt/openhands/workspace

            sudo chown -R 42420:42420 \
              /opt/openhands/home \
              /opt/openhands/workspace

            sudo chmod -R 770 \
              /opt/openhands/home \
              /opt/openhands/workspace

            sudo docker rm -f openhands 2>/dev/null || true

            sudo docker run -d \
              --restart unless-stopped \
              --name openhands \
              -p 3000:3000 \
              -e PORT=3000 \
              -e OH_WEB_URL="http://$VM_HOST:3000" \
              -e WEB_HOST="$VM_HOST:3000" \
              -e OH_PERSISTENCE_DIR=/.openhands \
              -e RUNTIME=docker \
              -e WORKSPACE_MOUNT_PATH=/opt/openhands/workspace \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v /opt/openhands/home:/.openhands \
              -v /opt/openhands/workspace:/opt/workspace_base \
              --add-host host.docker.internal:host-gateway \
              "$IMAGE"

            for attempt in $(seq 1 24); do
              if curl -fsS http://127.0.0.1:3000/ >/dev/null; then
                sudo docker ps --filter name=openhands
                rm -f /tmp/openhands-deploy/openhands-image.tar
                exit 0
              fi

              echo "Waiting for OpenHands... attempt $attempt"
              sleep 5
            done

            sudo docker logs --tail 200 openhands
            exit 1

      - name: Deployment URL
        run: |
          echo "OpenHands URL: http://${{ secrets.VM_HOST }}:3000"

      - name: Logout from Azure
        if: always()
        run: az logout
