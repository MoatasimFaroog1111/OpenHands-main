# Build the application image on every PR and publish it from main.
# This fork must not push to the upstream OpenHands GHCR namespace.
name: Docker

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/openhands-main

jobs:
  build-app:
    name: Build OpenHands app
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Validate image build
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        shell: bash
        run: |
          set -o pipefail
          if ! docker buildx build \
            --file containers/app/Dockerfile \
            --platform linux/amd64 \
            --build-arg OPENHANDS_BUILD_VERSION=sha-${{ github.sha }} \
            --tag openhands-ci:${{ github.sha }} \
            --load \
            --progress=plain \
            . >docker-build.log 2>&1; then
            echo 'Docker build failed. Last 180 log lines:'
            tail -n 180 docker-build.log
            exit 1
          fi
          tail -n 30 docker-build.log

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: containers/app/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            OPENHANDS_BUILD_VERSION=sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
