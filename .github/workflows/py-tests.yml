# Workflow that runs python tests
name: Run Python Tests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ (github.head_ref && github.ref) || github.run_id }}
  cancel-in-progress: true

jobs:
  test-on-linux:
    name: Python Tests on Linux
    runs-on: ubuntu-24.04
    env:
      INSTALL_DOCKER: "0"
    strategy:
      matrix:
        python-version: ["3.12"]
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install poetry via pipx
        run: pipx install poetry
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
      - name: Install Python dependencies using Poetry
        run: |
          poetry install --with dev,test,runtime
          poetry run pip install pytest-xdist
          poetry run pip install pytest-rerunfailures
      - name: Build Environment
        run: make build
      - name: Run Unit Tests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          if ! PYTHONPATH=".:$PYTHONPATH" poetry run pytest --forked -n 1 -q --tb=short --maxfail=20 ./tests/unit >pytest-diagnostic.log 2>&1; then
            echo 'Python unit tests failed. Diagnostic output:'
            tail -n 420 pytest-diagnostic.log
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              {
                echo '<!-- python-test-diagnostic -->'
                echo '### Python unit test failure — serial diagnostic'
                echo
                echo '```text'
                tail -n 400 pytest-diagnostic.log
                echo '```'
              } > /tmp/python-test-comment.md
              gh api --method PATCH \
                "repos/${GITHUB_REPOSITORY}/issues/comments/5020481300" \
                -f body="$(cat /tmp/python-test-comment.md)"
            fi
            exit 1
          fi
      - name: Store coverage file
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: python-test-diagnostic
          path: pytest-diagnostic.log

  test-enterprise:
    name: Enterprise Python Unit Tests
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Install poetry via pipx
        run: pipx install poetry
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
      - name: Install Python dependencies using Poetry
        working-directory: ./enterprise
        run: poetry install --with dev,test
      - name: Run Unit Tests
        run: PYTHONPATH=".:$PYTHONPATH" poetry run --project=enterprise pytest --forked -n auto -s -p no:ddtrace -p no:ddtrace.pytest_bdd -p no:ddtrace.pytest_benchmark ./enterprise/tests/unit --cov=enterprise --cov-branch
        env:
          COVERAGE_FILE: ".coverage.enterprise.${{ matrix.python_version }}"
      - name: Store coverage file
        uses: actions/upload-artifact@v7
        with:
          name: coverage-enterprise
          path: ".coverage.enterprise.${{ matrix.python_version }}"
          include-hidden-files: true

  coverage-comment:
    name: Coverage Comment
    if: false
    runs-on: ubuntu-latest
    needs: [test-on-linux, test-enterprise]
    steps:
      - run: echo "Coverage is temporarily disabled during serial test diagnosis."
