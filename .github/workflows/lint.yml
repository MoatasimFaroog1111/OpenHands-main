# Workflow that runs lint on the frontend and python code
name: Lint

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ (github.head_ref && github.ref) || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Lint, TypeScript compilation, and translation checks
        working-directory: ./frontend
        shell: bash
        run: |
          set -o pipefail

          run_check() {
            name="$1"
            shift
            log_file="${name}.log"
            if ! "$@" >"$log_file" 2>&1; then
              echo "${name} failed. Last 180 log lines:"
              tail -n 180 "$log_file"
              exit 1
            fi
            echo "${name} passed."
            tail -n 20 "$log_file"
          }

          run_check lint npm run lint
          run_check typescript bash -c 'npm run make-i18n && npx tsc'
          run_check translations npm run check-translation-completeness

  lint-python:
    name: Lint python
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: "pip"
      - name: Install pre-commit
        run: pip install pre-commit==3.7.0
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure --config ./dev_config/python/.pre-commit-config.yaml

  lint-enterprise-python:
    name: Lint enterprise python
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: "pip"
      - name: Install pre-commit
        run: pip install pre-commit==4.2.0
      - name: Run pre-commit hooks
        working-directory: ./enterprise
        run: pre-commit run --all-files --show-diff-on-failure --config ./dev_config/python/.pre-commit-config.yaml
