# Workflow that runs lint on the frontend and python code
name: Lint

# The jobs in this workflow are required, so they must run at all times
# Always run on "main"
# Always run on PRs
on:
  push:
    branches:
      - main
  pull_request:

# If triggered by a PR, it will be in the same group. However, each commit on main will be in its own unique group
concurrency:
  group: ${{ github.workflow }}-${{ (github.head_ref && github.ref) || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # Run lint on the frontend code
  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Lint, TypeScript compilation, and translation checks
        working-directory: ./frontend
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -o pipefail

          report_failure() {
            name="$1"
            log_file="$2"
            echo "${name} failed. Last 180 log lines:"
            tail -n 180 "$log_file"

            if [ "${{ github.event_name }}" = "pull_request" ]; then
              {
                echo '<!-- frontend-lint-diagnostic -->'
                echo "### Frontend ${name} failure"
                echo
                echo '```text'
                tail -n 120 "$log_file"
                echo '```'
              } > /tmp/frontend-lint-comment.md
              gh api --method PATCH \
                "repos/${GITHUB_REPOSITORY}/issues/comments/5020143305" \
                -f body="$(cat /tmp/frontend-lint-comment.md)"
            fi
            exit 1
          }

          if ! npm run lint >lint.log 2>&1; then
            report_failure lint lint.log
          fi
          echo 'lint passed.'

          if ! bash -c 'npm run make-i18n && npx tsc' >typescript.log 2>&1; then
            report_failure typescript typescript.log
          fi
          echo 'typescript passed.'

          if ! npm run check-translation-completeness >translations.log 2>&1; then
            report_failure translations translations.log
          fi
          echo 'translations passed.'

  # Run lint on the python code
  lint-python:
    name: Lint python
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: "pip"
      - name: Install pre-commit
        run: pip install pre-commit==3.7.0
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure --config ./dev_config/python/.pre-commit-config.yaml

  lint-enterprise-python:
    name: Lint enterprise python
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: "pip"
      - name: Install pre-commit
        run: pip install pre-commit==4.2.0
      - name: Run pre-commit hooks
        working-directory: ./enterprise
        run: pre-commit run --all-files --show-diff-on-failure --config ./dev_config/python/.pre-commit-config.yaml
