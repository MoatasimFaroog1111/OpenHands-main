name: Fix translation script mode

on:
  push:
    branches:
      - agent/fix-ci-deployments
    paths:
      - .github/workflows/fix-translation-script-mode.yml

permissions:
  contents: write

jobs:
  fix-mode:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v6
        with:
          ref: agent/fix-ci-deployments
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore executable mode
        shell: bash
        run: |
          set -euo pipefail
          chmod +x frontend/scripts/check-translation-completeness.cjs
          if git diff --quiet -- frontend/scripts/check-translation-completeness.cjs; then
            echo "Executable mode is already correct."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/scripts/check-translation-completeness.cjs
          git commit -m "Restore executable mode for translation check"
          git push origin HEAD:agent/fix-ci-deployments
